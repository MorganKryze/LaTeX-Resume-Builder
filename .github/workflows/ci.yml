name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Sync Python dependencies
        run: uv sync --all-groups
      - name: Ruff
        run: uv run ruff check .
      - name: Black
        run: uv run black --check .
      - name: Unit tests
        run: uv run python -m unittest tests.tests -v

  build-pdf:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Sync Python dependencies
        run: uv sync
      - name: Compile LaTeX (EN + FR)
        uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098 # v3 (3.3.0)
        with:
          root_file: |
            examples/resume-en.tex
            examples/resume-fr.tex
          work_in_root_file_dir: true
      - name: Convert + merge PDFs, generate JPEG cover
        run: uv run python scripts/convert_and_merge.py --config options.example.yml --project-root .
      - name: Generate QR code
        run: uv run python scripts/generate_qr_code.py --config options.example.yml --project-root .
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-output
          path: |
            build/
            examples/resume-en.jpg
            examples/resume-fr.jpg
          if-no-files-found: error

  publish-gh-pages:
    runs-on: ubuntu-latest
    needs: build-pdf
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-output
          path: artifact/
      - name: Assemble site/ for gh-pages
        run: |
          mkdir -p site/pdf
          cp artifact/build/resume.pdf site/pdf/resume.pdf
          cp artifact/examples/resume-en.jpg site/resume.jpg
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
